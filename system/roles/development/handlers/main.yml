---
# =============================================================================
# Development Role — Handlers
# =============================================================================

- name: Restart docker
  ansible.builtin.systemd:
    name: docker.service
    state: restarted
  become: true
  when: enable_docker | bool

- name: Restart libvirtd
  ansible.builtin.systemd:
    name: libvirtd.service
    state: restarted
  become: true
  when: enable_libvirt | bool
