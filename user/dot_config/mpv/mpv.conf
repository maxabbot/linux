# ============================================================================
# mpv — hardware-accelerated, sane defaults
# ============================================================================

# --- Video ---
vo=gpu-next
gpu-api=vulkan
# NVIDIA hardware decoding (falls back to software if unavailable)
hwdec=nvdec-copy
hwdec-codecs=all

video-sync=display-resync
interpolation=yes
tscale=oversample

# --- Audio ---
ao=pipewire
volume=80
volume-max=150
audio-normalize-downmix=yes

# --- Behaviour ---
save-position-on-quit=yes
keep-open=yes
autofit-larger=90%x90%
geometry=50%:50%
no-border

# --- OSD ---
osd-font="FiraCode Nerd Font"
osd-font-size=28
osd-color="#cdd6f4"
osd-shadow-color="#1e1e2e"
osd-shadow-offset=2
osd-duration=2000

# --- Subtitles ---
sub-auto=fuzzy
sub-font="FiraCode Nerd Font"
sub-font-size=36
sub-color="#cdd6f4"
sub-back-color="#1e1e2e80"
sub-border-size=0

# --- Screenshots ---
screenshot-directory=~/Pictures/Screenshots
screenshot-template="%F_%wH:%wM:%wS"
screenshot-format=png

# --- ytdl-hook ---
ytdl-format=bestvideo[height<=?1080]+bestaudio/best
