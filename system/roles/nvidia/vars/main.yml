---
# =============================================================================
# NVIDIA Role — Variables
# =============================================================================

# Core NVIDIA driver stack (official repos)
nvidia_driver_packages:
  - nvidia-open-lts
  - nvidia-utils
  - nvidia-settings
  - nvidia-prime
  - egl-wayland
  - opencl-nvidia
  - lib32-nvidia-utils
  - lib32-opencl-nvidia

# CUDA stack (gated by enable_cuda_stack) — official repos
nvidia_cuda_packages:
  - clinfo

# AUR packages (headers + CUDA tools)
nvidia_aur_packages:
  - nv-codec-headers
  - cuda
  - cuda-tools
  - cudnn

# mkinitcpio NVIDIA modules
nvidia_mkinitcpio_modules:
  - nvidia
  - nvidia_modeset
  - nvidia_uvm
  - nvidia_drm

# Kernel parameter
nvidia_kernel_param: nvidia-drm.modeset=1

# Services
nvidia_services:
  - nvidia-persistenced.service
